services:
  bot:
    build: .
    container_name: socrates-bot
    restart: unless-stopped
    env_file:
      - .env
    command: ["sh", "-c", "rm -rf auth_info_baileys/* && node --watch index.js"]
    volumes:
      # Mount the current directory for live local development
      - ./:/usr/src/app
      # Prevent the host from overwriting the container's node_modules
      - /usr/src/app/node_modules
      # Persist the WhatsApp session files so you don't need to re-scan the QR code on every restart
      - ./auth_info_baileys:/usr/src/app/auth_info_baileys
      # Optional: Mount the assets folder if you have it locally
      # - ./assets:/usr/src/app/assets

