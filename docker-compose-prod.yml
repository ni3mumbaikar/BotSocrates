version: '3.8'

services:
  bot:
    build: .
    container_name: socrates-bot-prod
    restart: unless-stopped
    # Overrides the Dockerfile command to remove the --watch flag for production
    command: ["sh", "-c", "rm -rf auth_info_baileys/* && node index.js"]
    env_file:
      - .env
    volumes:
      # Persist the WhatsApp session files so you don't need to re-scan the QR code on every restart
      - ./auth_info_baileys:/usr/src/app/auth_info_baileys
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    container_name: socrates-mongodb-prod
    restart: unless-stopped
    ports:
      # Binds only to localhost on the host machine for security
      - "127.0.0.1:27017:27017"
    volumes:
      # Persists MongoDB database data
      - mongodb_data:/data/db

volumes:
  mongodb_data:
